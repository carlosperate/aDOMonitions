<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100"
  preserveAspectRatio="xMidYMid meet"
  role="img" aria-label="aDOMonitions logo">
  <title>aDOMonitions</title>

  <defs>
    <clipPath id="outer">
      <rect x="4" y="4" width="312" height="92" rx="12"/>
    </clipPath>
  </defs>

  <!-- Callout: white background with border -->
  <rect x="4" y="4" width="312" height="92" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Callout: left accent bar (clipped for rounded top/bottom-left corners) -->
  <rect x="4" y="4" width="12" height="92" fill="#1e3a8a" clip-path="url(#outer)"/>

  <!-- Icon group (vertically centered in 100px) -->

  <!-- Icon: < bracket -->
  <polyline points="33,27 22,50 33,73"
    fill="none" stroke="#1e3a8a" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Icon: > bracket -->
  <polyline points="77,27 88,50 77,73"
    fill="none" stroke="#1e3a8a" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Icon: Callout box body -->
  <rect x="40" y="30" width="30" height="40" rx="4" fill="#1f2937"/>
  <!-- Icon: Left accent bar -->
  <rect x="40" y="30" width="5" height="40" rx="2" fill="#f59e0b"/>
  <!-- Icon: Simulated text lines -->
  <rect x="50" y="39" width="14" height="3" rx="1" fill="#9ca3af"/>
  <rect x="50" y="46" width="12" height="3" rx="1" fill="#6b7280"/>
  <rect x="50" y="53" width="13" height="3" rx="1" fill="#6b7280"/>
  <rect x="50" y="60" width="9"  height="3" rx="1" fill="#6b7280"/>

  <!-- Wordmark (vertically centered in 100px → baseline at y=61) -->
  <text x="95" y="61"
    font-family="ui-monospace,'SF Mono',Consolas,'Liberation Mono',monospace"
    font-size="32" font-weight="700" letter-spacing="-1.5" style="font-kerning:none">
    <tspan fill="#1e3a8a">a</tspan><tspan fill="#f59e0b">D</tspan><tspan fill="#f59e0b">O</tspan><tspan fill="#f59e0b">M</tspan><tspan fill="#1e3a8a" dx="1">o</tspan><tspan fill="#1e3a8a">n</tspan><tspan fill="#1e3a8a">i</tspan><tspan fill="#1e3a8a">t</tspan><tspan fill="#1e3a8a">i</tspan><tspan fill="#1e3a8a">o</tspan><tspan fill="#1e3a8a">n</tspan><tspan fill="#1e3a8a">s</tspan>
  </text>
</svg>
